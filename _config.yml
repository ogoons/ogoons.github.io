title: 담백로그
author: ogoons
email: ogoons@hanmail.net # email for form submission, you also have to change it in _js/scripts.js
description: > # this means to ignore newlines until "baseurl:"
  안드로이드와 다양한 개발 주제를 다룹니다.
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://ogoons.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:  # replace with your_twitter_username or comment to remove link from footer
github_username:  ogoons # replace with your_github_username or comment to remove link from footer
instagram_username:  # replace with your_instagram_username or comment to remove link from footer
social:
  name: Oh Su Cheol
  links:
    - https://www.facebook.com/ogoons
    - https://www.linkedin.com/in/ogoons
    - https://github.com/ogoons

disqus:
  shortname: OGOONS # to enable comments replace with your_disqus_shortname

# Build settings
markdown: kramdown
highlighter: rouge # or pygments or null
theme: jekyll-sleek
exclude:
  - README.md
  - node_modules
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.png

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
